services:
  opencode:
    build:
      context: .
      tags:
        - opencode-docker-ubuntu
    env_file:
      - .env

    entrypoint: ["/usr/bin/tini", "--", "opencode"]
    command: serve --port 4096 --hostname 0.0.0.0

    volumes:
      - ./restart-opencode:/root/.config/opencode/skills/restart-opencode:ro

      # Persistent system directories – only real ones (symlinks stay in container)
      - ./persistent_root/etc:/etc
      - ./persistent_root/home:/home
      - ./persistent_root/media:/media
      - ./persistent_root/mnt:/mnt
      - ./persistent_root/opt:/opt
      - ./persistent_root/root:/root
      - ./persistent_root/run:/run
      - ./persistent_root/srv:/srv
      - ./persistent_root/usr:/usr
      - ./persistent_root/var:/var
    networks:
      - openchamber_net
    restart: unless-stopped

  openchamber:
    build:
      context: .
      dockerfile: Dockerfile.openchamber
      tags:
        - openchamber-docker-ubuntu
    environment:
      - UI_PASSWORD=${OPENCHAMBER_UI_PASSWORD}
      - OPENCODE_HOST=http://opencode:4096
      - OPENCODE_SKIP_START=true
    ports:
      - "${OPENCODE_IP:-127.0.0.1}:${OPENCODE_PORT:-4096}:4096"
    depends_on:
      - opencode
    networks:
      - openchamber_net
    restart: unless-stopped

networks:
  openchamber_net:
